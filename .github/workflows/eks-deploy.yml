name: Build Scan Push Deploy to EKS

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

# ── Top-level: least-privilege defaults ─────────────────────────────────────
permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
  NAMESPACE: ${{ vars.NAMESPACE }}
  HELM_RELEASE_NAME: ${{ vars.HELM_RELEASE_NAME }}
  HELM_CHART_PATH: helm/springboot-app
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ── Job 1: Build → Scan → Push → Deploy ─────────────────────────────────
  build-scan-push-deploy:
    name: Build, scan, push, and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
      id-token: write        # FIX 1: moved here from top-level; only this job needs OIDC

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install GHAST
        run: |
          python -m pip install --upgrade pip
          pip install ghast-scanner


      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Maven build and test
        run: mvn clean test package

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # FIX 2: was hardcoded "432049653779" — now uses the vars context
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-eks-deploy-role
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-eks-deploy

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t "$ECR_REPOSITORY:$IMAGE_TAG" .
          docker tag "$ECR_REPOSITORY:$IMAGE_TAG" \
            "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG"

      # FIX 3: trivy-action is AVOIDED entirely due to the March 2026 supply chain
      # attack (CVE-2026-33634) which compromised tags v0.0.1-v0.34.2 and all
      # setup-trivy versions. Installing the Trivy binary directly at a pinned
      # safe version (v0.70.0) removes the compromised action dependency completely.
      - name: Install Trivy (v0.70.0)
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v0.70.0
          trivy --version

      - name: Scan Docker image with Trivy
        run: |
          trivy image \
            --no-progress \
            --format table \
            "$ECR_REPOSITORY:$IMAGE_TAG"

      - name: Push Docker image to ECR
        run: |
          docker push \
            "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG"

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region "$AWS_REGION" \
            --name "$EKS_CLUSTER_NAME"

      - name: Deploy to EKS using Helm
        run: |
          helm upgrade --install "$HELM_RELEASE_NAME" "$HELM_CHART_PATH" \
            --namespace "$NAMESPACE" \
            --set image.repository="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY" \
            --set image.tag="$IMAGE_TAG" \
            --atomic \
            --timeout 5m

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/"$HELM_RELEASE_NAME" -n "$NAMESPACE"
          kubectl get pods   -n "$NAMESPACE" -o wide
          kubectl get svc    -n "$NAMESPACE"
          kubectl get ingress -n "$NAMESPACE"

  # ── Job 2: Git tag (runs only on main, after deploy succeeds) ────────────
  # FIX 4: removed full checkout + manual git config + push via HTTPS token.
  # Now uses GitHub REST API via `gh` — no checkout needed, simpler and safer.
  create-git-tag:
    name: Create Git tag
    runs-on: ubuntu-latest
    needs: build-scan-push-deploy
    if: github.ref_name == 'main'
    permissions:
      contents: write

    steps:
      - name: Tag commit via GitHub API
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          DATE_TAG="$(date -u +"%Y.%m.%d-%H%M")"
          GIT_TAG="v${DATE_TAG}-${SHORT_SHA}"

          echo "Tagging commit $GITHUB_SHA as $GIT_TAG"

          gh api \
            --method POST \
            /repos/${{ github.repository }}/git/refs \
            -f ref="refs/tags/${GIT_TAG}" \
            -f sha="${GITHUB_SHA}"