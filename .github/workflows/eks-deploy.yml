name: Build Scan Push Deploy to EKS

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
  NAMESPACE: ${{ vars.NAMESPACE }}
  HELM_RELEASE_NAME: ${{ vars.HELM_RELEASE_NAME }}
  HELM_CHART_PATH: helm/springboot-app
  IMAGE_TAG: ${{ github.sha }}


jobs:
  create-git-tag:
    name: Create Git tag
    runs-on: ubuntu-latest
    needs: build-scan-push-deploy
    if: github.ref_name == 'main'

    permissions:
      contents: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Create and push Git tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE_TAG=$(date +"%Y.%m.%d-%H%M")
          GIT_TAG="v${DATE_TAG}-${SHORT_SHA}"

          echo "Creating Git tag: $GIT_TAG"

          git fetch --tags

          if git tag --list | grep -q "^${GIT_TAG}$"; then
            echo "Tag already exists: $GIT_TAG"
          else
            git tag -a "$GIT_TAG" -m "Release $GIT_TAG"
            git push "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" "$GIT_TAG"
          fi
  build-scan-push-deploy:
    name: Build, scan, push, and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
      

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4


      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install GHAST
        run: |
          python -m pip install --upgrade pip
          pip install ghast-scanner

      - name: Run GHAST scan
        run: |
          ghast --dir .github/workflows --verbose --ignore-warnings

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Maven build and test
        run: mvn clean test package

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::432049653779:role/github-actions-eks-deploy-role
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-eks-deploy

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t "$ECR_REPOSITORY:$IMAGE_TAG" .
          docker tag "$ECR_REPOSITORY:$IMAGE_TAG" "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG"

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          format: table

      - name: Push Docker image to ECR
        run: |
          docker push "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG"

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region "$AWS_REGION" \
            --name "$EKS_CLUSTER_NAME"

      - name: Deploy to EKS using Helm
        run: |
          helm upgrade --install "$HELM_RELEASE_NAME" "$HELM_CHART_PATH" \
            --namespace "$NAMESPACE" \
            --set image.repository="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY" \
            --set image.tag="$IMAGE_TAG" \
            --atomic \
            --timeout 5m

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/$HELM_RELEASE_NAME -n "$NAMESPACE"
          kubectl get pods -n "$NAMESPACE" -o wide
          kubectl get svc -n "$NAMESPACE"
          kubectl get ingress -n "$NAMESPACE"
